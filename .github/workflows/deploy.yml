name: Build images and deploy to EC2 (images only)

on:
  push:
    branches: ["develop"]   
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_SPRING: ghcr.io/goorm-mingleup/backend-spring

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (for Spring build)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ---- GHCR 로그인 ----
      - name: Log in to GHCR (auto fallback)
        run: |
          echo "🔐 Logging in to GHCR..."
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "✅ Using Personal Access Token (GHCR_TOKEN)"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          else
            echo "✅ Using default GITHUB_TOKEN"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          fi

      # ---- SPRING IMAGE ----
      - name: Extract metadata (spring)
        id: meta_spring
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SPRING }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (spring)
        uses: docker/build-push-action@v6
        with:
          context: ./backend-spring
          file: ./backend-spring/Dockerfile
          push: true
          tags: ${{ steps.meta_spring.outputs.tags }}
          labels: ${{ steps.meta_spring.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- DEPLOY to EC2 ----
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key
          chmod 600 /tmp/ec2_key

      - name: Update TAG and compose up on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          SHA_TAG=${GITHUB_SHA}
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key ${EC2_USER}@${EC2_HOST} "
            set -e

            REPO_DIR=/opt/backend
            BRANCH=develop

            # /opt 권한 확보
            sudo mkdir -p /opt
            sudo chown -R \$USER:\$USER /opt

            # 저장소 clone 또는 pull
            if [ ! -d \$REPO_DIR/.git ]; then
              echo 'Repository not found. Cloning...'
              git clone -b \$BRANCH https://github.com/Goorm-MingleUp/backend.git \$REPO_DIR
            else
              echo 'Repository exists. Pulling latest from develop...'
              cd \$REPO_DIR
              git fetch origin \$BRANCH
              git checkout \$BRANCH
              git reset --hard origin/\$BRANCH
            fi

            # infra 폴더로 이동
            cd \$REPO_DIR/infra

            # TAG 갱신
            sed -i 's/^TAG=.*/TAG='\"${SHA_TAG}\"'/' .env

            # GHCR private이면 로그인 (옵션)
            # echo '${{ secrets.GHCR_TOKEN }}' | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # docker compose / docker-compose 감지
            if docker compose version >/dev/null 2>&1; then
              COMPOSE='docker compose'
            else
              COMPOSE='docker-compose'
            fi

            sudo \$COMPOSE pull
            sudo \$COMPOSE up -d
        


