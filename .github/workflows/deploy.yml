name: Java CI with Gradle

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-spring 
          file: ./backend-spring/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-service:latest
          platforms: linux/amd64,linux/arm64

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.PRIVATE_KEY }}
          source: "./infra/docker-compose.yml"
          target: "/home/ec2-user/"
          
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.PRIVATE_KEY }}
          script_stop: true
          script: |
            # .env 파일 동적 생성
            cat > ./infra/.env << EOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            
            # S3 설정 (아까 추가함)
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            
            # ▼▼▼ [여기 추가!] JWT & Kakao 설정 ▼▼▼
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            BASE_URL=${{ secrets.BASE_URL }}
            EOF
            
            cat > ./home/ec2-user/mysql/conf.d << EOF

            [mysqld]

            character-set-server = utf8mb4
            collation-server = utf8mb4_0900_ai_ci
            skip-character-set-client-handshake = ON

            [client]
            default-character-set = utf8mb4

            [mysql]
            default-character-set = utf8mb4

            EOF

            cat > /home/ec2-user/mysql/conf.d << EOF

            ALTER DATABASE `${MYSQL_DATABASE}`
              CHARACTER SET utf8mb4
              COLLATE utf8mb4_0900_ai_ci;

            EOF

            sudo docker-compose -f ./infra/docker-compose.yml down
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/spring-service:latest
            sudo docker image prune -f
            sudo docker-compose -f ./infra/docker-compose.yml up -d
