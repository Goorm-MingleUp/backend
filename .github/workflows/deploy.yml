name: Build images and deploy to EC2 (images only)

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_SPRING: ghcr.io/goorm-mingleup/backend-spring  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (for Spring build)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ---------- GHCR 로그인 (PAT 우선, 없으면 GITHUB_TOKEN) ----------
      # 권장: Secrets에 GHCR_TOKEN(PAT: packages:write,read + 필요시 repo) 추가
      # 선택: GHCR_USERNAME(해당 PAT의 소유자 계정명) 추가
      - name: Log in to GHCR with PAT
        if: ${{ secrets.GHCR_TOKEN != '' }}
        run: |
          USERNAME="${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}"
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "$USERNAME" --password-stdin

      - name: Log in to GHCR with GITHUB_TOKEN (fallback)
        if: ${{ secrets.GHCR_TOKEN == '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- SPRING IMAGE ----------
      - name: Extract metadata (spring)
        id: meta_spring
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SPRING }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (spring)
        uses: docker/build-push-action@v6
        with:
          context: ./backend-spring
          file: ./backend-spring/Dockerfile
          push: true
          tags: ${{ steps.meta_spring.outputs.tags }}
          labels: ${{ steps.meta_spring.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- DEPLOY to EC2 ----------
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key
          chmod 600 /tmp/ec2_key

      - name: Update TAG and compose up on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          SHA_TAG=${GITHUB_SHA}
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key ${EC2_USER}@${EC2_HOST} "
            set -e

            REPO_DIR=/opt/backend
            BRANCH=develop

            sudo mkdir -p /opt
            sudo chown -R \$USER:\$USER /opt

            if [ ! -d \$REPO_DIR/.git ]; then
              echo 'Repository not found. Cloning...'
              git clone -b \$BRANCH https://github.com/Goorm-MingleUp/backend.git \$REPO_DIR
            else
              echo 'Repository exists. Pulling latest from develop...'
              cd \$REPO_DIR
              git fetch origin \$BRANCH
              git checkout \$BRANCH
              git reset --hard origin/\$BRANCH
            fi

            cd \$REPO_DIR/infra
            sed -i 's/^TAG=.*/TAG='\"${SHA_TAG}\"'/' .env

            # (프라이빗 패키지라면) EC2에서도 GHCR 로그인
            # Secrets에 GHCR_TOKEN(+선택 GHCR_USERNAME) 넣어뒀을 때만 수행
            if [ -n \"${{ secrets.GHCR_TOKEN }}\" ]; then
              GH_USER=\"${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}\"
              echo '${{ secrets.GHCR_TOKEN }}' | sudo docker login ghcr.io -u \"\$GH_USER\" --password-stdin
            fi

            if docker compose version >/dev/null 2>&1; then
              COMPOSE='docker compose'
            else
              COMPOSE='docker-compose'
            fi

            sudo \$COMPOSE pull
            sudo \$COMPOSE up -d
          "
