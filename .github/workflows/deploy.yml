name: Build images and deploy to EC2 (images only)

on:
  push:
    branches: ["develop"]   
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_SPRING: ghcr.io/Goorm-MingleUp/backend-spring

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR push 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (for Spring build)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ---- SPRING IMAGE ----
      - name: Extract metadata (spring)
        id: meta_spring
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SPRING }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (spring)
        uses: docker/build-push-action@v6
        with:
          context: ./backend-spring
          file: ./backend-spring/Dockerfile
          push: true
          tags: ${{ steps.meta_spring.outputs.tags }}
          labels: ${{ steps.meta_spring.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- DEPLOY to EC2 ----
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key
          chmod 600 /tmp/ec2_key

      - name: Update TAG and compose up on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          SHA_TAG=${GITHUB_SHA}
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key ${EC2_USER}@${EC2_HOST} "
            set -e
            cd /opt/app/infra   # EC2에서 docker-compose.yml 있는 경로로 변경하세요
            sed -i 's/^TAG=.*/TAG='\"${SHA_TAG}\"'/' .env

            sudo docker compose pull
            sudo docker compose up -d
          "
