name: Build images and deploy to EC2 (images only)

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_SPRING: ghcr.io/goorm-mingleup/backend-spring  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (for Spring build)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Log in to GHCR (auto fallback)
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}     
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -e
          USERNAME="${GHCR_USERNAME:-$GITHUB_ACTOR}"
          if [ -n "$GHCR_TOKEN" ]; then
            echo "Using PAT (GHCR_TOKEN) as $USERNAME"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$USERNAME" --password-stdin
          else
            echo "Using default GITHUB_TOKEN as $GITHUB_ACTOR"
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          fi

      # ---------- SPRING IMAGE ----------
      - name: Extract metadata (spring)
        id: meta_spring
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SPRING }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (spring)
        uses: docker/build-push-action@v6
        with:
          context: ./backend-spring
          file: ./backend-spring/Dockerfile
          push: true
          tags: ${{ steps.meta_spring.outputs.tags }}
          labels: ${{ steps.meta_spring.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- DEPLOY to EC2 ----------
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key
          chmod 600 /tmp/ec2_key

      - name: Update TAG and compose up on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          SHA_TAG=${GITHUB_SHA}
          ssh -o StrictHostKeyChecking=no -i /tmp/ec2_key ${EC2_USER}@${EC2_HOST} "
            set -e

            REPO_DIR=/opt/backend
            BRANCH=develop

            sudo mkdir -p /opt
            sudo chown -R \$USER:\$USER /opt

            if [ ! -d \$REPO_DIR/.git ]; then
              echo 'Repository not found. Cloning...'
              git clone -b \$BRANCH https://github.com/Goorm-MingleUp/backend.git \$REPO_DIR
            else
              echo 'Repository exists. Pulling latest from develop...'
              cd \$REPO_DIR
              git fetch origin \$BRANCH
              git checkout \$BRANCH
              git reset --hard origin/\$BRANCH
            fi

            cd \$REPO_DIR/infra
            sed -i 's/^TAG=.*/TAG='\"${SHA_TAG}\"'/' .env

            if [ -n \"${{ secrets.GHCR_TOKEN }}\" ]; then
              GH_USER=\"${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}\"
              echo '${{ secrets.GHCR_TOKEN }}' | sudo docker login ghcr.io -u \"\$GH_USER\" --password-stdin
            fi

            if docker compose version >/dev/null 2>&1; then
              COMPOSE='docker compose'
            else
              COMPOSE='docker-compose'
            fi

            sudo \$COMPOSE pull
            sudo \$COMPOSE up -d
          "
