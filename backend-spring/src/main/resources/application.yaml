server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mingleup?serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  messages:
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    defer-datasource-initialization: true # Delay data.sql execution time to after DB initialization
    database-platform: org.hibernate.dialect.MySQLDialect # Use MYSQL dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    s3:
      bucket: mingleup-s3-bucket
    region:
      static: ap-northeast-2
    stack:
      auto: false

# This file should be used as gitignore in real work
jwt:
  secret: ${JWT_SECRET}
  expiration-in-ms: '3600000'

